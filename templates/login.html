<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #5865f2, #7289da);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.container {
    background:white;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
h2 {
    margin-bottom:20px;
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#f1f1f1;
}
<!DOCTYPE html>
<html>
<body>

<h2>PyChat</h2>

<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<script>
function login(){
fetch('/login',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:`username=${u.value}&password=${p.value}`
}).then(r=>r.text()).then(t=>{
if(t=="OK") location='/chat'; else alert(t);
});
}

function register(){
fetch('/register',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:`username=${u.value}&password=${p.value}`
}).then(r=>r.text()).then(alert);
}
</script>

</body>
</html>
